server:
  port: 8000 # Porta que o Gateway vai rodar

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      # Descoberta automática de rotas via Eureka também fica habilitada (lb://<service-id>)
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        # IAM Service (auth + usuários) — resolvido via Eureka
        - id: iam-service-auth
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**
        - id: iam-service-usuarios
          uri: lb://iam-service
          predicates:
            - Path=/api/usuarios/**

        # Paciente Service
        - id: paciente-service
          uri: lb://paciente-service
          predicates:
            - Path=/api/pacientes/**

        # Catálogo Service (setores, leitos, convênios, medicamentos, TUSS, CID-10 + agregados)
        - id: catalogo-service
          uri: lb://catalogo-service
          predicates:
            - Path=/api/setores/**,/api/leitos/**,/api/convenios/**,/api/medicamentos/**,/api/procedimentos-tuss/**,/api/cid10/**,/api/catalogos/**

        # Agendamento Service
        - id: agendamento-service
          uri: lb://agendamento-service
          predicates:
            - Path=/api/agendamentos/**

        # Faturamento Service
        - id: faturamento-service
          uri: lb://faturamento-service
          predicates:
            - Path=/api/contas/**,/api/guias-tiss/**

        # Dashboard Service (agregador)
        - id: dashboard-service
          uri: lb://dashboard-service
          predicates:
            - Path=/api/dashboards/**

        # Auditoria Service (leitura da trilha)
        - id: auditoria-service
          uri: lb://auditoria-service
          predicates:
            - Path=/api/auditoria/**

        # Rota padrão: tudo o mais ainda vai para o Monólito (porta 8080)
        - id: monolito-route
          uri: http://localhost:8080
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
