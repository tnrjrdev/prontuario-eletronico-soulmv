# ============================================================
# Perfil PROD — PostgreSQL
# Variáveis esperadas (ver docker-compose.yml):
#   DB_URL, DB_USER, DB_PASSWORD
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospitalardb}
spring.datasource.username=${DB_USER:hospitalar}
spring.datasource.password=${DB_PASSWORD:hospitalar}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Em produção use migrações (Flyway) e mantenha validate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console desabilitado em produção
spring.h2.console.enabled=false
