# ============================================================
# Configuração comum (todos os perfis)
# Perfil ativo padrão: dev (H2 em memória).
# Para produção use: --spring.profiles.active=prod
# ============================================================
spring.application.name=hospitalar
spring.profiles.active=dev

server.port=8080

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# JWT (sobrescreva o secret em produção via variável de ambiente)
# ============================================================
app.security.jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-com-no-minimo-32-bytes!!}
app.security.jwt.access-token-expiration-minutes=${JWT_ACCESS_EXP:60}
app.security.jwt.refresh-token-expiration-days=${JWT_REFRESH_EXP:7}
app.security.jwt.issuer=soulmv-hospitalar

# ============================================================
# Armazenamento de anexos/laudos (filesystem/volume)
# ============================================================
app.storage.local.base-path=${STORAGE_PATH:./storage}

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
